name: Automated Data Preprocessing

on:
  push:
    branches:
      - main

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run preprocessing script
      run: |
        python preprocessing/automate_Raissa-Nabila-Putri-Riski.py

    - name: Commit and Push Clean Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add preprocessing/diabetes_prediction_dataset_preprocessing.csv preprocessing/diabetes_prediction_dataset_testing.csv
        git commit -m "chore: automated preprocessing via GitHub Actions [skip ci]" || echo "No changes to commit"
        git push